<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Estudios Interactivo - Ciencia de Datos</title>
<style>
/* ── TOKENS ── */
:root{
  --bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;
  --bd:rgba(255,255,255,.09);--bds:rgba(255,255,255,.2);
  --tx:#e8eaf0;--tx2:#8b90a7;--ac:#5B8DEF;
  --cbg:#1a1d27;--cnm:#fff;
  --pb:rgba(255,255,255,.09);--pf:#8b90a7;
  --aid:rgba(255,255,255,.42);
}
[data-theme=light]{
  --bg:#eef0f5;--sf:#fff;--sf2:#f5f6fa;
  --bd:rgba(0,0,0,.1);--bds:rgba(0,0,0,.22);
  --tx:#1a1d2e;--tx2:#5a6070;--ac:#2563EB;
  --cbg:#fff;--cnm:#111827;
  --pb:rgba(0,0,0,.06);--pf:#5a6070;
  --aid:rgba(40,50,90,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;transition:background .2s,color .2s}

/* ── HEADER ── */
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 24px;position:sticky;top:0;z-index:200}
.htop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo h1{font-size:15px;font-weight:700;color:var(--tx);line-height:1.2}
.logo p{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.hbtns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--bds);background:var(--sf2);color:var(--tx);transition:border-color .14s,background .14s;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--ac)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.primary:hover{filter:brightness(1.1)}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(91,141,239,.12);border:1px solid rgba(91,141,239,.3);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--ac)}
.bdot{width:6px;height:6px;background:var(--ac);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ── SOURCE BAR ── */
.srcbar{display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--sf2);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.srcbar label{font-size:11px;font-weight:600;color:var(--tx2);white-space:nowrap}
.srcbar input{flex:1;min-width:220px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 10px;font-size:11.5px;outline:none;font-family:monospace;transition:border-color .18s}
.srcbar input:focus{border-color:var(--ac)}
.srcbar input::placeholder{color:var(--tx2);font-family:'Segoe UI',system-ui,sans-serif}
.src-hint{font-size:10px;color:var(--tx2);white-space:nowrap}

/* ── CONTROLS ── */
.ctls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:7px 24px;background:var(--sf);border-bottom:1px solid var(--bd)}
.sw{position:relative;flex:1;min-width:140px;max-width:240px}
.sw input{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 10px 6px 28px;font-size:12px;outline:none;transition:border-color .18s}
.sw input:focus{border-color:var(--ac)}
.sw input::placeholder{color:var(--tx2)}
.sw svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:14px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.chip.on{opacity:1}
.chip:not(.on){opacity:.28;filter:saturate(.15)}
.chip:hover:not(.on){opacity:.65}

/* ── STATS ── */
.stats{display:flex;border-bottom:1px solid var(--bd);background:var(--sf)}
.stat{flex:1;text-align:center;padding:7px 4px;border-right:1px solid var(--bd)}
.stat:last-child{border-right:none}
.stn{font-size:18px;font-weight:700;color:var(--tx)}
.stl{font-size:8.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

/* ── SCROLL WRAPPER ── */
.sc{overflow:auto;padding:20px 24px 32px}

/* ── MALLA: flex de columnas, SVG absoluto encima ── */
.malla-wrap{position:relative;width:max-content;min-width:100%}
#arrowsvg{position:absolute;top:0;left:0;pointer-events:none;z-index:10;overflow:visible}
.malla{display:flex;gap:0;width:max-content}

/* ── COLUMN ── */
.col{display:flex;flex-direction:column;width:186px;flex-shrink:0}
.colhdr{text-align:center;padding-bottom:10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);border-bottom:2px solid var(--bd);margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.colhdr-num{font-size:20px;font-weight:800;color:var(--tx);line-height:1}
.cards{display:flex;flex-direction:column;gap:13px;padding-right:18px}

/* ── CARD ── */
.card{width:168px;min-height:86px;border-radius:10px;padding:9px 10px 8px;position:relative;cursor:pointer;border-top:3px solid transparent;background:var(--cbg);border-left:1px solid var(--bd);border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);transition:transform .16s,box-shadow .16s,opacity .16s;user-select:none}
.card:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.card.dim{opacity:.1}
.card.hl{box-shadow:0 0 0 2.5px var(--ac),0 5px 18px rgba(0,0,0,.25)}
.card.pre{box-shadow:0 0 0 2.5px #22c55e,0 4px 16px rgba(34,197,94,.2)}
.card.suc{box-shadow:0 0 0 2.5px #f59e0b,0 4px 16px rgba(245,158,11,.2)}
.ck{font-size:8.5px;font-weight:700;letter-spacing:.08em;opacity:.65;text-transform:uppercase;margin-bottom:3px}
.cn{font-size:10.5px;font-weight:600;line-height:1.35;color:var(--cnm)}
.cf{display:flex;gap:4px;margin-top:6px}
.pill{font-size:8.5px;font-weight:700;padding:2px 5px;border-radius:4px;background:var(--pb);color:var(--pf)}
.pdot{position:absolute;right:6px;bottom:6px;width:6px;height:6px;border-radius:50%;background:#22c55e;opacity:.7}

/* ── ARROWS ── */
@keyframes march{from{stroke-dashoffset:28}to{stroke-dashoffset:0}}

/* ── OPTATIVAS ── */
.opts{padding:0 24px 24px}
.ot{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:11px;border-top:1px solid var(--bd);padding-top:16px}
.og{display:flex;gap:12px;flex-wrap:wrap}
.ogg{background:var(--sf);border:1px dashed var(--bds);border-radius:10px;padding:10px 12px}
.ogt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:7px}
.ogc{display:flex;gap:7px;flex-wrap:wrap}

/* ── LEGEND ── */
.legend{background:var(--sf);border-top:1px solid var(--bd);padding:12px 24px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.lt{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-right:4px;white-space:nowrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2);white-space:nowrap}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── PANEL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;backdrop-filter:blur(3px)}
.ov.open{display:block}
.pn{position:fixed;right:0;top:0;bottom:0;width:320px;max-width:90vw;background:var(--sf2);border-left:1px solid var(--bd);z-index:301;padding:22px 18px;overflow-y:auto;transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;gap:14px}
.pn.open{transform:translateX(0)}
.pcbar{height:4px;border-radius:4px}
.pck{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--tx2);text-transform:uppercase}
.pname{font-size:17px;font-weight:700;color:var(--tx);line-height:1.3}
.psec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:5px;margin-top:10px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pstat{background:var(--sf);border-radius:8px;padding:9px;border:1px solid var(--bd)}
.psn{font-size:16px;font-weight:800;color:var(--tx)}
.psl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.pdesc{background:var(--sf);border-radius:8px;padding:12px;border:1px solid var(--bd);font-size:12px;color:var(--tx2);line-height:1.5;}
.pdesc strong{color:var(--tx);font-weight:600;}
.pdesc .row{margin-bottom: 6px;}
.rc{background:var(--sf);border-radius:7px;padding:8px 10px;border-left:3px solid;margin-bottom:4px;cursor:pointer;transition:background .12s}
.rc:hover{background:var(--bg)}
.rn{font-size:11px;font-weight:600;color:var(--tx)}
.rk{font-size:9px;color:var(--tx2);margin-top:1px}
.xb{position:absolute;top:12px;right:12px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .12s}
.xb:hover{background:var(--bg)}
.lb{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:700;margin-top:1px}

/* ── LOADER / ERROR ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;padding:32px;text-align:center}
#loader.hidden{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin 1s linear infinite}

@media(max-width:640px){
  header,.srcbar,.ctls,.legend,.opts{padding-left:14px;padding-right:14px}
  .sc{padding:12px}
  .stats{display:none}
}
</style>
</head>
<body>

<header>
  <div class="htop">
    <div class="logo">
      <h1 id="planTitle">Plan de Estudios Interactivo</h1>
      <p id="planSubtitle">Cargando…</p>
    </div>
    <div class="hbtns">
      <div class="badge"><span class="bdot"></span>Interactivo</div>
      <button class="btn" id="themeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span id="themeLabel">Modo claro</span>
      </button>
      <button class="btn" id="pdfBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span id="pdfLabel">PDF</span>
      </button>
    </div>
  </div>
</header>

<div class="srcbar">
  <label for="sheetUrl">🔗 Fuente de datos (Google Sheets):</label>
  <input type="text" id="sheetUrl"
    value="https://docs.google.com/spreadsheets/d/1j1OW22HqY01vJU-uOvIJRFqA59l412xDzKnvknjqJWc/edit?usp=sharing"
    placeholder="https://docs.google.com/spreadsheets/d/…/edit">
  <button class="btn primary" id="loadBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="13" height="13">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
    </svg>
    Buscar / Cargar
  </button>
  <span class="src-hint">Hoja requerida: <b>Materias</b> (Incluir columna Prerrequisitos)</span>
</div>

<div class="ctls">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="srch" placeholder="Buscar materia o clave…">
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="stats" id="stats"></div>

<div class="sc" id="sc">
  <div class="malla-wrap" id="mallaWrap">
    <svg id="arrowsvg"></svg>
    <div class="malla" id="malla"></div>
  </div>
</div>

<div class="opts" id="opts"></div>

<div class="legend" id="leg"><span class="lt">Áreas / Líneas Curriculares</span></div>

<div class="ov" id="ov"></div>
<div class="pn" id="pn">
  <button class="xb" id="xb">✕</button>
  <div id="pc"></div>
</div>

<div id="loader">
  <svg class="spinner" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--ac)" stroke-width="2">
    <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
  </svg>
  <span id="loaderMsg" style="font-size:13px;color:var(--tx2)">Iniciando…</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════
   UTILIDADES GOOGLE SHEETS → CSV
════════════════════════════════════════════ */
function extractSheetId(url){
  const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m?m[1]:null;
}

function makeUrls(sheetId, sheetName){
  const enc=encodeURIComponent(sheetName);
  return [
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${enc}`,
    `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=${enc}`,
    `https://corsproxy.io/?url=${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=${enc}`)}`,
  ];
}

function parseCsv(raw){
  const rows=[];let row=[];let cell='';let q=false;
  for(let i=0;i<raw.length;i++){
    const c=raw[i],n=raw[i+1];
    if(c==='"'){if(q&&n==='"'){cell+='"';i++;}else q=!q;}
    else if(c===','&&!q){row.push(cell);cell='';}
    else if((c==='\n'||c==='\r')&&!q){
      if(c==='\r'&&n==='\n')i++;
      row.push(cell);
      if(row.some(v=>v.trim()))rows.push(row);
      row=[];cell='';
    }else cell+=c;
  }
  row.push(cell);
  if(row.some(v=>v.trim()))rows.push(row);
  return rows;
}

function csvToObjs(rows){
  if(rows.length<2)return[];
  const hdrs=rows[0].map(v=>v.replace(/^"|"$/g,'').trim());
  return rows.slice(1).map(r=>{
    const o={};
    hdrs.forEach((h,i)=>o[h]=(r[i]||'').replace(/^"|"$/g,'').trim());
    return o;
  }).filter(o=>Object.values(o).some(v=>v));
}

async function fetchSheet(sheetId, name){
  const urls=makeUrls(sheetId,name);
  let lastErr='';
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok){lastErr=`HTTP ${r.status}`;continue;}
      const txt=await r.text();
      if(txt.trim().startsWith('<!')){lastErr='Respuesta HTML (verifica permisos)';continue;}
      const rows=parseCsv(txt);
      if(rows.length<2){lastErr='Hoja vacía';continue;}
      return csvToObjs(rows);
    }catch(e){lastErr=e.message;continue;}
  }
  throw new Error(`Hoja "${name}": ${lastErr}`);
}

/* ════════════════════════════════════════════
   PALETA DINÁMICA DE COLORES
════════════════════════════════════════════ */
const PALETTE=[
  '#F28B82','#FB8C00','#FDD663','#81C995','#6CB4E4','#5BB974',
  '#00ACC1','#7986CB','#A78BFA','#90A4AE','#F06292','#4DB6AC',
  '#FF8A65','#BA68C8','#B0BEC5','#EF9A9A','#4FC3F7','#AED581',
];
let colorMap={};
let colorIdx=0;

function colorFor(linea){
  if(!colorMap[linea]){
    colorMap[linea]=PALETTE[colorIdx%PALETTE.length];
    colorIdx++;
  }
  return colorMap[linea];
}

/* ════════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════════ */
let MATERIAS=[], SERIACIONES=[], OPTATIVAS=[];
let byKey={}, semOrder=[], semMap={}, preOf={}, sucOf={};
let cardEls={};
let activeFilters=new Set(), searchQ='', activeCard=null, isDark=true;

function buildLookups(){
  byKey={};
  MATERIAS.forEach(m=>byKey[m.clave]=m);

  const semSet=new Set(MATERIAS.map(m=>m.sem).filter(s=>s&&s.toLowerCase()!=='optativa'));
  semOrder=[...semSet].sort((a,b)=>{
    const na=parseFloat(a),nb=parseFloat(b);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return a.localeCompare(b);
  });

  semMap={};
  semOrder.forEach(s=>semMap[s]=[]);
  MATERIAS.forEach(m=>{if(semMap[m.sem])semMap[m.sem].push(m);});

  preOf={};sucOf={};
  SERIACIONES.forEach(([a,b])=>{
    if(!preOf[b])preOf[b]=[];preOf[b].push(a);
    if(!sucOf[a])sucOf[a]=[];sucOf[a].push(b);
  });
}

/* ════════════════════════════════════════════
   LOADER UI
════════════════════════════════════════════ */
function showLoader(msg){
  const el=document.getElementById('loader');
  el.classList.remove('hidden');
  el.innerHTML=`
    <svg class="spinner" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--ac)" stroke-width="2">
      <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
    </svg>
    <span style="font-size:13px;color:var(--tx2)">${msg}</span>`;
}
function hideLoader(){
  document.getElementById('loader').classList.add('hidden');
}
function showError(msg){
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('loader').innerHTML=`
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#F28B82" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p style="font-size:14px;font-weight:600;color:var(--tx)">Error de Carga</p>
    <p style="font-size:12px;color:var(--tx2);max-width:460px">${msg}</p>
    <button onclick="location.reload()" style="margin-top:10px;padding:7px 18px;border-radius:8px;border:1px solid var(--bds);background:var(--sf2);color:var(--tx);cursor:pointer;font-size:13px">Reintentar</button>`;
}

/* ════════════════════════════════════════════
   RENDERIZADO
════════════════════════════════════════════ */
function renderStats(){
  const creds=MATERIAS.reduce((a,m)=>a+(+m.cr||5),0);
  const lins=new Set(MATERIAS.map(m=>m.linea)).size;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stn">${MATERIAS.filter(m=>m.sem.toLowerCase()!=='optativa').length}</div><div class="stl">Materias</div></div>
    <div class="stat"><div class="stn">${creds}</div><div class="stl">Créditos</div></div>
    <div class="stat"><div class="stn">${semOrder.length}</div><div class="stl">Semestres</div></div>
    <div class="stat"><div class="stn">${SERIACIONES.length}</div><div class="stl">Seriaciones</div></div>
    <div class="stat"><div class="stn">${lins}</div><div class="stl">Líneas</div></div>`;
}

function renderChips(){
  const lins=[...new Set(MATERIAS.map(m=>m.linea))].sort();
  const w=document.getElementById('chips');w.innerHTML='';

  const all=document.createElement('div');
  all.className='chip '+(activeFilters.size===0?'on':'');
  all.style.cssText='background:rgba(128,128,128,.11);border-color:rgba(128,128,128,.3);color:var(--tx)';
  all.textContent='Todas';
  all.onclick=()=>{activeFilters.clear();renderChips();applyFilter();};
  w.appendChild(all);

  lins.forEach(l=>{
    const hex=colorFor(l);
    const on=activeFilters.has(l);
    const c=document.createElement('div');
    c.className='chip '+(on?'on':'');
    c.style.cssText=`background:${hex}${on?'28':'14'};border-color:${hex}${on?'bb':'44'};color:${hex}`;
    c.textContent=l;
    c.onclick=()=>{
      activeFilters.has(l)?activeFilters.delete(l):activeFilters.add(l);
      renderChips();applyFilter();
    };
    w.appendChild(c);
  });
}

/* ════════════════════════════════════════════
   LÓGICA DE FLECHAS (ARROWS)
════════════════════════════════════════════ */
const CORRIDOR_GAP=18;
const CORNER_R=5;
const LANE_STEP=2.8;

function relPos(el){
  const base=document.getElementById('mallaWrap');
  let x=0,y=0,cur=el;
  while(cur&&cur!==base){x+=cur.offsetLeft;y+=cur.offsetTop;cur=cur.offsetParent;}
  return{x,y,w:el.offsetWidth,h:el.offsetHeight};
}

function getCardW(){
  const c=document.querySelector('.col .card');
  return c?c.offsetWidth:168;
}

function corridorCenterX(ci, cardW){
  const cols=[...document.querySelectorAll('#malla .col')];
  if(ci>=cols.length)return 0;
  const base=document.getElementById('mallaWrap');
  let cx=0,cur=cols[ci];
  while(cur&&cur!==base){cx+=cur.offsetLeft;cur=cur.offsetParent;}
  return cx+cardW+(CORRIDOR_GAP/2);
}

function colIdxOf(clave){
  const m=byKey[clave];if(!m)return 0;
  return semOrder.indexOf(m.sem);
}

function roundedPath(pts){
  if(pts.length<2)return'';
  let d=`M${r(pts[0].x)},${r(pts[0].y)}`;
  for(let i=1;i<pts.length;i++){
    const prev=pts[i-1],curr=pts[i],next=pts[i+1];
    if(!next){d+=` L${r(curr.x)},${r(curr.y)}`;continue;}
    const dx1=curr.x-prev.x, dy1=curr.y-prev.y;
    const dx2=next.x-curr.x, dy2=next.y-curr.y;
    const l1=Math.abs(dx1)+Math.abs(dy1);
    const l2=Math.abs(dx2)+Math.abs(dy2);
    if(l1<1||l2<1){d+=` L${r(curr.x)},${r(curr.y)}`;continue;}
    const rv=Math.min(CORNER_R,l1/2,l2/2);
    const ax=curr.x-(dx1/l1)*rv, ay=curr.y-(dy1/l1)*rv;
    const bx=curr.x+(dx2/l2)*rv, by=curr.y+(dy2/l2)*rv;
    d+=` L${r(ax)},${r(ay)} Q${r(curr.x)},${r(curr.y)} ${r(bx)},${r(by)}`;
  }
  return d;
}
function r(n){return Math.round(n*10)/10;}

let laneMap={};
function getLane(ci,y1,y2){
  if(!laneMap[ci])laneMap[ci]=[];
  const yA=Math.min(y1,y2),yB=Math.max(y1,y2);
  let lane=0;
  while(true){
    const conflict=laneMap[ci].filter(e=>e.l===lane).some(e=>!(e.b<yA-1||e.a>yB+1));
    if(!conflict)break;
    lane++;
  }
  laneMap[ci].push({l:lane,a:yA,b:yB});
  return lane;
}

function idleColor(){return getComputedStyle(document.documentElement).getPropertyValue('--aid').trim()||'rgba(255,255,255,.42)';}

function mkMarker(ns,id,fill){
  const mk=document.createElementNS(ns,'marker');
  mk.setAttribute('id',id);
  mk.setAttribute('markerWidth','5');mk.setAttribute('markerHeight','5');
  mk.setAttribute('refX','4.5');mk.setAttribute('refY','2.5');
  mk.setAttribute('orient','auto');
  const p=document.createElementNS(ns,'polygon');
  p.setAttribute('points','0 0.5, 4.5 2.5, 0 4.5');
  p.setAttribute('fill',fill);
  mk.appendChild(p);
  return mk;
}

function renderArrows(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.getElementById('arrowsvg');
  svg.innerHTML='';
  const firstCard=document.querySelector('#malla .card');
  if(!firstCard||!firstCard.offsetWidth)return;

  const cardW=getCardW();
  const idle=idleColor();

  const defs=document.createElementNS(ns,'defs');
  defs.appendChild(mkMarker(ns,'mi',idle));
  defs.appendChild(mkMarker(ns,'mp','#22c55e'));
  defs.appendChild(mkMarker(ns,'ms','#f59e0b'));
  svg.appendChild(defs);

  const wrap=document.getElementById('mallaWrap');
  svg.setAttribute('width',wrap.scrollWidth);
  svg.setAttribute('height',wrap.scrollHeight);

  laneMap={};

  SERIACIONES.forEach(([src,tgt])=>{
    const se=document.getElementById('c-'+src);
    const te=document.getElementById('c-'+tgt);
    if(!se||!te)return;

    const sp=relPos(se),tp=relPos(te);
    if(!sp.w||!tp.w)return;

    const x1=sp.x+sp.w, y1=sp.y+sp.h/2;
    const x2=tp.x, y2=tp.y+tp.h/2;

    const ci=Math.max(0,Math.min(colIdxOf(src),semOrder.length-2));
    const lane=getLane(ci,y1,y2);
    const corrX=corridorCenterX(ci,cardW)+(lane*LANE_STEP)-(Math.min(lane,2)*LANE_STEP*0.5);

    const pts=[{x:x1, y:y1},{x:corrX, y:y1},{x:corrX, y:y2},{x:x2, y:y2}];
    const d=roundedPath(pts);
    if(!d)return;

    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',idle);
    path.setAttribute('stroke-width','1.6');
    path.setAttribute('marker-end','url(#mi)');
    path.dataset.src=src;
    path.dataset.tgt=tgt;
    svg.appendChild(path);
  });
}

function animArrow(p,color,marker){
  p.setAttribute('stroke',color);
  p.setAttribute('stroke-width','2.2');
  p.setAttribute('marker-end',`url(#${marker})`);
  p.setAttribute('stroke-dasharray','10 6');
  p.style.animation='march 1.4s linear infinite';
}

function resetArrow(p){
  const idle=idleColor();
  p.setAttribute('stroke',idle);
  p.setAttribute('stroke-width','1.6');
  p.setAttribute('marker-end','url(#mi)');
  p.setAttribute('stroke-dasharray','none');
  p.style.animation='';
  p.style.opacity='1';
}

function onHover(k){
  document.querySelectorAll('#arrowsvg path').forEach(p=>{
    const rel=p.dataset.src===k||p.dataset.tgt===k;
    p.style.opacity=rel?'1':'0.08';
    if(!rel){resetArrow(p);return;}
    if(p.dataset.src===k) animArrow(p,'#f59e0b','ms');
    else animArrow(p,'#22c55e','mp');
  });
  Object.values(cardEls).forEach(el=>{
    const ek=el.id.replace('c-','');
    const isPre=(preOf[k]||[]).includes(ek);
    const isSuc=(sucOf[k]||[]).includes(ek);
    const rel=ek===k||isPre||isSuc;
    el.classList.toggle('dim',!rel);
    el.classList.remove('hl','pre','suc');
    if(ek===k)el.classList.add('hl');
    else if(isPre)el.classList.add('pre');
    else if(isSuc)el.classList.add('suc');
  });
}

function clearHighlights(){
  document.querySelectorAll('#arrowsvg path').forEach(p=>{resetArrow(p);});
  Object.values(cardEls).forEach(el=>el.classList.remove('dim','hl','pre','suc'));
}

function restorePanel(){
  if(!activeCard)return;
  const m=byKey[activeCard];if(!m)return;
  const col=colorFor(m.linea);
  const idle=idleColor();
  document.querySelectorAll('#arrowsvg path').forEach(p=>{
    const rel=p.dataset.src===activeCard||p.dataset.tgt===activeCard;
    p.style.opacity='1';
    p.style.animation='';p.setAttribute('stroke-dasharray','none');
    p.setAttribute('stroke',rel?col:idle);
    p.setAttribute('stroke-width',rel?'2.2':'1.6');
    p.setAttribute('marker-end',`url(#${rel?(p.dataset.src===activeCard?'ms':'mp'):'mi'})`);
  });
}

function onLeave(){
  if(activeCard){restorePanel();return;}
  clearHighlights();
}

function applyFilter(){
  const q=searchQ.toLowerCase();
  Object.values(cardEls).forEach(el=>{
    const k=el.id.replace('c-','');
    const m=byKey[k];if(!m)return;
    const ml=activeFilters.size===0||activeFilters.has(m.linea);
    const mq=!q||m.nombre.toLowerCase().includes(q)||m.clave.toLowerCase().includes(q);
    el.classList.toggle('dim',!(ml&&mq));
  });
}

/* ════════════════════════════════════════════
   PANEL LATERAL (Detalles ampliados)
════════════════════════════════════════════ */
function openPanel(m){
  activeCard=m.clave;
  const col=colorFor(m.linea);
  const pres=(preOf[m.clave]||[]).map(k=>byKey[k]).filter(Boolean);
  const sucs=(sucOf[m.clave]||[]).map(k=>byKey[k]).filter(Boolean);

  Object.values(cardEls).forEach(el=>{
    const k=el.id.replace('c-','');
    el.classList.remove('hl','pre','suc','dim');
    if(k===m.clave)el.classList.add('hl');
    else if(pres.find(p=>p.clave===k))el.classList.add('pre');
    else if(sucs.find(s=>s.clave===k))el.classList.add('suc');
  });
  restorePanel();

  document.getElementById('pc').innerHTML=`
    <div class="pcbar" style="background:${col}"></div>
    <div class="pck">${m.clave} · Sem. ${m.sem}</div>
    <div class="pname">${m.nombre}</div>
    <div class="lb" style="background:${col}22;color:${col}">${m.linea}</div>
    
    <div class="pgrid" style="margin-top:10px;">
      <div class="pstat"><div class="psn">${m.cr}</div><div class="psl">Créditos</div></div>
      <div class="pstat"><div class="psn">${m.uc}</div><div class="psl">U. de Cobro</div></div>
      <div class="pstat"><div class="psn">${m.horas}</div><div class="psl">Horas</div></div>
      <div class="pstat"><div class="psn" style="font-size:13px;word-break:break-word">${m.tipo}</div><div class="psl">Tipo</div></div>
    </div>

    <div class="pdesc" style="margin-top:10px;">
      <div class="row"><strong>Plan:</strong> ${m.plan}</div>
      <div class="row"><strong>Equivalencia:</strong> ${m.equivalencia}</div>
      <div class="row"><strong>Notas:</strong> ${m.notas}</div>
    </div>

    ${pres.length?`<div>
      <div class="psec">Prerrequisitos (${pres.length})</div>
      ${pres.map(p=>`<div class="rc" style="border-left-color:#22c55e" onclick="openPanel(byKey['${p.clave}'])">
        <div class="rn">${p.nombre}</div><div class="rk">${p.clave} · Sem. ${p.sem}</div></div>`).join('')}
    </div>`:''}
    ${sucs.length?`<div>
      <div class="psec">Da acceso a (${sucs.length})</div>
      ${sucs.map(s=>`<div class="rc" style="border-left-color:#f59e0b" onclick="openPanel(byKey['${s.clave}'])">
        <div class="rn">${s.nombre}</div><div class="rk">${s.clave} · Sem. ${s.sem}</div></div>`).join('')}
    </div>`:''}
    ${!pres.length&&!sucs.length?'<p style="color:var(--tx2);font-size:12px;text-align:center;padding:18px 0">Sin prerrequisitos ni subsecuentes</p>':''}`;

  document.getElementById('pn').classList.add('open');
  document.getElementById('ov').classList.add('open');
}

function closePanel(){
  document.getElementById('pn').classList.remove('open');
  document.getElementById('ov').classList.remove('open');
  activeCard=null;
  clearHighlights();
}

/* ════════════════════════════════════════════
   CARGA PRINCIPAL (Google Sheets)
════════════════════════════════════════════ */
async function loadFromUrl(rawUrl){
  const sheetId=extractSheetId(rawUrl);
  if(!sheetId){showError('URL inválida — debe ser un enlace válido de Google Sheets');return;}
  colorMap={};colorIdx=0;
  activeFilters.clear();activeCard=null;searchQ='';

  showLoader('Cargando plan de estudios...');
  try{
    const mrows=await fetchSheet(sheetId,'Materias');
    
    MATERIAS=mrows.map(r=>({
      clave:  (r['Clave']||r['clave']||'').trim(),
      nombre: (r['Nombre']||r['nombre']||'').trim(),
      sem:    (r['Semestre']||r['semestre']||'').trim(),
      cr:     (r['Creditos']||r['Créditos']||r['creditos']||r['CR']||'5'),
      uc:     (r['UC']||r['uc']||'5'),
      linea:  (r['Línea']||r['Linea']||r['Linea_Curricular']||r['linea']||'Sin línea').trim(),
      horas:  (r['Horas']||r['horas']||r['Hrs']||'-').trim(),
      plan:   (r['Plan']||r['plan']||'-').trim(),
      equivalencia: (r['Equivalencia']||r['equivalencia']||'-').trim(),
      tipo:   (r['Tipo']||r['tipo']||'-').trim(),
      notas:  (r['Notas']||r['notas']||'-').trim(),
      prereqsRaw: (r['Prerrequisitos']||r['Prerrequisito']||r['prerrequisitos']||r['prerequisito']||'').trim()
    })).filter(m=>m.clave&&m.nombre);

    /* Generar seriaciones dinámicamente desde la columna Prerrequisitos */
    SERIACIONES = [];
    MATERIAS.forEach(m => {
      if(m.prereqsRaw && m.prereqsRaw !== '-') {
        // Separamos por comas o punto y coma en caso de que existan múltiples prerrequisitos.
        const reqs = m.prereqsRaw.split(/[,;]/).map(s => s.trim()).filter(s => s);
        reqs.forEach(req => SERIACIONES.push([req, m.clave]));
      }
    });

    /* Opcional: Intentar cargar la hoja extra de Seriaciones si existe por retrocompatibilidad */
    try{
      const srows = await fetchSheet(sheetId, 'Seriaciones');
      srows.forEach(r => {
        const a = (r['Clave_Prerequisito']||r['Prerequisito']||r['prerequisito']||'').trim();
        const b = (r['Clave_Siguiente']||r['Siguiente']||r['siguiente']||'').trim();
        if(a && b) SERIACIONES.push([a, b]);
      });
    } catch(e) {
      // Ignorar de forma silenciosa, ya que estamos sacándolos de la columna "Prerrequisitos".
    }

    const opts=MATERIAS.filter(m=>m.sem.toLowerCase()==='optativa');
    const og={};
    opts.forEach(m=>{if(!og[m.linea])og[m.linea]=[];og[m.linea].push(m);});
    OPTATIVAS=Object.entries(og).map(([g,ms])=>({grupo:g,materias:ms}));

    const title = mrows[0]?.['Plan'] || mrows[0]?.['plan'] || 'Ingeniería en Ciencia de Datos';
    const institution = mrows[0]?.['Institucion'] || mrows[0]?.['Institución'] || '';
    document.getElementById('planTitle').textContent=title;
    document.getElementById('planSubtitle').textContent=institution;

    hideLoader();
    boot();
  }catch(e){
    showError(e.message);
  }
}

function boot(){
  buildLookups();
  renderStats();
  renderChips();
  renderLegend();
  renderMalla();
  renderOptativas();

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      renderArrows();
      setTimeout(renderArrows, 200);
      setTimeout(renderArrows, 600);
    });
  });
}

document.getElementById('loadBtn').onclick=()=>{
  const url=document.getElementById('sheetUrl').value.trim();
  if(url)loadFromUrl(url);
};
document.getElementById('sheetUrl').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('loadBtn').click();

document.getElementById('srch').addEventListener('input',e=>{

});

document.getElementById('ov').onclick=closePanel;
window.addEventListener('resize',()=>{renderArrows();});
document.getElementById('sc').addEventListener('scroll',()=>{renderArrows();});

window.byKey=byKey;
window.openPanel=openPanel;
