<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Estudios - Ingeniería en Ciencia de Datos</title>
    <style>
        :root {
            --bg: #0f1117; --sf: #1a1d27; --sf2: #22263a;
            --bd: rgba(255,255,255,0.09);
            --tx: #e8eaf0; --tx2: #8b90a7; --ac: #5B8DEF;
            --cbg: #1a1d27; --cnm: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--tx); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow-x: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        
        /* HEADER */
        header { 
            background: var(--sf); border-bottom: 1px solid var(--bd); 
            padding: 15px 24px; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100;
        }
        .logo h1 { font-size: 18px; font-weight: 700; color: var(--tx); }
        .logo p { font-size: 11px; color: var(--tx2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
        
        /* MAIN SCROLL AREA */
        .sc { 
            flex: 1; overflow: auto; padding: 24px; position: relative; 
        }
        
        /* GRID DE MATERIAS */
        .malla-wrap { position: relative; width: max-content; min-height: 600px; }
        #arrowsvg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; overflow: visible; }
        .malla { display: flex; gap: 20px; width: max-content; position: relative; z-index: 1; }
        
        /* COLUMNAS (SEMESTRES) */
        .col { display: flex; flex-direction: column; width: 190px; flex-shrink: 0; }
        .colhdr { 
            text-align: center; padding-bottom: 12px; font-size: 10px; font-weight: 700; 
            letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx2); 
            border-bottom: 2px solid var(--bd); margin-bottom: 16px; 
        }
        .colhdr-num { font-size: 22px; font-weight: 800; color: var(--tx); line-height: 1.1; display: block;}
        .cards { display: flex; flex-direction: column; gap: 14px; }
        
        /* TARJETAS (MATERIAS) */
        .card { 
            background: var(--cbg); border: 1px solid var(--bd); border-radius: 10px; 
            padding: 10px 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; 
            border-left-width: 5px; position: relative;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 20;}
        .ck { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; opacity: 0.7; text-transform: uppercase; margin-bottom: 4px; }
        .cn { font-size: 11px; font-weight: 600; line-height: 1.35; color: var(--cnm); margin-bottom: 8px;}
        .cf { display: flex; gap: 5px; }
        .pill { font-size: 9px; font-weight: 700; padding: 3px 6px; border-radius: 4px; background: rgba(255,255,255,0.08); color: var(--tx2); }
        
        /* LEYENDA (LÍNEAS) */
        .legend { 
            background: var(--sf); border-top: 1px solid var(--bd); 
            padding: 12px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; 
        }
        .lt { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--tx2); margin-right: 8px; }
        .li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--tx2); }
        .ld { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
        
        /* PANEL LATERAL */
        .ov { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; backdrop-filter: blur(2px); }
        .ov.open { display: block; }
        .pn { 
            position: fixed; right: 0; top: 0; bottom: 0; width: 340px; max-width: 90vw; 
            background: var(--sf2); border-left: 1px solid var(--bd); z-index: 301; 
            padding: 24px; overflow-y: auto; transform: translateX(100%); 
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; gap: 16px;
        }
        .pn.open { transform: translateX(0); }
        .xb { 
            position: absolute; top: 16px; right: 16px; background: var(--sf); 
            border: 1px solid var(--bd); color: var(--tx); width: 28px; height: 28px; 
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
        }
        .xb:hover { background: var(--bg); }
        
        .pck { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--tx2); text-transform: uppercase; }
        .pname { font-size: 18px; font-weight: 700; color: var(--tx); line-height: 1.3; }
        .pline { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #fff; margin-top: 4px;}
        
        .pgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pstat { background: var(--sf); border-radius: 8px; padding: 10px; border: 1px solid var(--bd); text-align: center;}
        .psn { font-size: 18px; font-weight: 800; color: var(--tx); }
        .psl { font-size: 9px; color: var(--tx2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
        
        .pinfo-box { background: var(--sf); border-radius: 8px; padding: 12px; border: 1px solid var(--bd); }
        .pinfo-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--tx2); margin-bottom: 6px; }
        .pinfo-val { font-size: 12px; color: var(--tx); line-height: 1.4;}
        
        /* LOADER */
        #loader { 
            position: fixed; inset: 0; background: var(--bg); display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 999; 
        }
        #loader.hidden { display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--bd); border-top-color: var(--ac); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Ingeniería en Ciencia de Datos</h1>
            <p>Plan de Estudios Interactivo</p>
        </div>
    </header>

    <div class="sc" id="sc">
        <div class="malla-wrap" id="mallaWrap">
            <svg id="arrowsvg"></svg>
            <div class="malla" id="malla"></div>
        </div>
    </div>

    <div class="legend" id="leg">
        <span class="lt">Líneas Curriculares:</span>
        </div>

    <div class="ov" id="ov"></div>
    <div class="pn" id="pn">
        <button class="xb" id="xb">✕</button>
        <div class="pck" id="pClave"></div>
        <div class="pname" id="pNombre"></div>
        <div><span class="pline" id="pLinea"></span></div>
        
        <div class="pgrid">
            <div class="pstat">
                <div class="psn" id="pCR"></div><div class="psl">Créditos</div>
            </div>
            <div class="pstat">
                <div class="psn" id="pUC"></div><div class="psl">Unidades</div>
            </div>
            <div class="pstat">
                <div class="psn" id="pHoras"></div><div class="psl">Horas</div>
            </div>
        </div>

        <div class="pinfo-box">
            <div class="pinfo-title">Prerrequisitos</div>
            <div class="pinfo-val" id="pPrerreq">Ninguno</div>
        </div>
        
        <div class="pinfo-box">
            <div class="pinfo-title">Detalles Adicionales</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div><span style="color:var(--tx2); font-size:10px;">Plan:</span> <span id="pPlan" style="font-size:11px;"></span></div>
                <div><span style="color:var(--tx2); font-size:10px;">Tipo:</span> <span id="pTipo" style="font-size:11px;"></span></div>
                <div style="grid-column: span 2;"><span style="color:var(--tx2); font-size:10px;">Equivalencia:</span> <span id="pEq" style="font-size:11px;"></span></div>
            </div>
        </div>

        <div class="pinfo-box" id="pNotasBox" style="display:none;">
            <div class="pinfo-title">Notas</div>
            <div class="pinfo-val" id="pNotas"></div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <span style="font-size: 14px; font-weight:600;">Cargando datos desde Google Sheets...</span>
    </div>

<script>
    // URL de exportación a CSV de tu documento.
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1j1OW22HqY01vJU-uOvIJRFqA59l412xDzKnvknjqJWc/export?format=csv&gid=1615401150';
    
    // Paleta de colores para las "Líneas"
    const COLORS = [
        '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
        '#ec4899', '#06b6d4', '#f97316', '#84cc16', '#64748b', '#eab308'
    ];

    let subjects = [];
    let linesMap = {};

    // Iniciar
    fetchData();

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            processCSV(csv);
        } catch (err) {
            console.error("Error cargando CSV:", err);
            document.getElementById('loader').innerHTML = '<span>Error al cargar los datos. Verifica que el enlace sea público.</span>';
        }
    }

    function processCSV(csv) {
        // Parsear CSV básico ignorando comas dentro de comillas
        const rows = [];
        let quote = false;
        let col = '', row = [];
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], nc = csv[i+1];
            if (c === '"' && quote && nc === '"') { col += '"'; i++; }
            else if (c === '"') { quote = !quote; }
            else if (c === ',' && !quote) { row.push(col.trim()); col = ''; }
            else if (c === '\n' && !quote) {
                if (col.endsWith('\r')) col = col.slice(0, -1);
                row.push(col.trim()); rows.push(row); row = []; col = '';
            } else { col += c; }
        }
        if (col) { row.push(col.trim()); }
        if (row.length) rows.push(row);

        const headers = rows[0].map(h => h.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim());
        
        // Mapeo dinámico de columnas
        const hIdx = {
            semestre: headers.findIndex(h => h.includes('semestre')),
            clave: headers.findIndex(h => h.includes('clave')),
            materia: headers.findIndex(h => h.includes('materia') || h.includes('nombre')),
            linea: headers.findIndex(h => h.includes('linea')),
            prerreq: headers.findIndex(h => h.includes('prerrequisito')),
            cr: headers.findIndex(h => h === 'cr' || h.includes('credito')),
            uc: headers.findIndex(h => h === 'uc' || h.includes('unidad')),
            horas: headers.findIndex(h => h.includes('hora')),
            plan: headers.findIndex(h => h.includes('plan')),
            equiv: headers.findIndex(h => h.includes('equivalencia')),
            tipo: headers.findIndex(h => h.includes('tipo')),
            notas: headers.findIndex(h => h.includes('nota'))
        };

        let colorIndex = 0;

        for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (!r[hIdx.materia]) continue; // saltar filas vacías

            const lineaName = hIdx.linea >= 0 && r[hIdx.linea] ? r[hIdx.linea] : 'Sin Línea';
            
            // Asignar color a la línea si no existe
            if (!linesMap[lineaName]) {
                linesMap[lineaName] = COLORS[colorIndex % COLORS.length];
                colorIndex++;
            }

            subjects.push({
                semestre: hIdx.semestre >= 0 ? r[hIdx.semestre] : '0',
                clave: hIdx.clave >= 0 ? r[hIdx.clave].toUpperCase() : '',
                materia: r[hIdx.materia],
                linea: lineaName,
                color: linesMap[lineaName],
                prerreqs: hIdx.prerreq >= 0 ? r[hIdx.prerreq] : '',
                cr: hIdx.cr >= 0 ? r[hIdx.cr] : '-',
                uc: hIdx.uc >= 0 ? r[hIdx.uc] : '-',
                horas: hIdx.horas >= 0 ? r[hIdx.horas] : '-',
                plan: hIdx.plan >= 0 ? r[hIdx.plan] : '-',
                equiv: hIdx.equiv >= 0 ? r[hIdx.equiv] : '-',
                tipo: hIdx.tipo >= 0 ? r[hIdx.tipo] : '-',
                notas: hIdx.notas >= 0 ? r[hIdx.notas] : ''
            });
        }

        renderMalla();
        renderLegend();
        document.getElementById('loader').classList.add('hidden');
        
        // Dibujar flechas después de que el DOM esté listo
        setTimeout(drawArrows, 300);
        setTimeout(drawArrows, 1000);
    }

    function renderMalla() {
        const malla = document.getElementById('malla');
        malla.innerHTML = '';

        // Agrupar por semestre
        const semestres = {};
        subjects.forEach(s => {
            const sem = s.semestre || 'Optativas';
            if (!semestres[sem]) semestres[sem] = [];
            semestres[sem].push(s);
        });

        // Ordenar semestres (numéricamente si es posible)
        const semKeys = Object.keys(semestres).sort((a,b) => {
            let numA = parseInt(a.replace(/\D/g,''));
            let numB = parseInt(b.replace(/\D/g,''));
            if(!isNaN(numA) && !isNaN(numB)) return numA - numB;
            return a.localeCompare(b);
        });

        semKeys.forEach(k => {
            const col = document.createElement('div');
            col.className = 'col';
            
            const numLabel = k.replace(/\D/g,'');
            const textLabel = numLabel ? 'SEMESTRE' : '';
            
            col.innerHTML = `
                <div class="colhdr">
                    <span class="colhdr-num">${numLabel || k}</span>
                    ${textLabel}
                </div>
                <div class="cards" id="sem-${k}"></div>
            `;
            
            const cardsContainer = col.querySelector('.cards');
            semestres[k].forEach(sub => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${sub.clave}`;
                card.style.borderLeftColor = sub.color;
                
                // Atributos de datos para interactividad hover
                card.setAttribute('data-clave', sub.clave);
                card.setAttribute('data-prerreqs', sub.prerreqs);

                card.innerHTML = `
                    <div class="ck" style="color: ${sub.color}">${sub.clave}</div>
                    <div class="cn">${sub.materia}</div>
                    <div class="cf">
                        <span class="pill">CR: ${sub.cr}</span>
                        <span class="pill">UC: ${sub.uc}</span>
                    </div>
                `;

                card.onclick = () => openPanel(sub);
                
                // Hover events para resaltar flechas
                card.onmouseenter = () => highlightArrows(sub.clave);
                card.onmouseleave = resetArrows;

                cardsContainer.appendChild(card);
            });
            malla.appendChild(col);
        });
    }

    function renderLegend() {
        const leg = document.getElementById('leg');
        Object.keys(linesMap).forEach(line => {
            const el = document.createElement('div');
            el.className = 'li';
            el.innerHTML = `<div class="ld" style="background:${linesMap[line]}"></div> ${line}`;
            leg.appendChild(el);
        });
    }

    function drawArrows() {
        const svg = document.getElementById('arrowsvg');
        svg.innerHTML = '';
        const wrap = document.getElementById('mallaWrap').getBoundingClientRect();
        
        subjects.forEach(sub => {
            if (!sub.prerreqs || sub.prerreqs.trim() === '') return;
            
            const targetEl = document.getElementById(`card-${sub.clave}`);
            if (!targetEl) return;
            
            // Separar múltiples prerrequisitos por coma
            const prereqList = sub.prerreqs.split(',').map(s => s.trim().toUpperCase());
            
            prereqList.forEach(pre => {
                const sourceEl = document.getElementById(`card-${pre}`);
                if (!sourceEl) return;
                
                const r1 = sourceEl.getBoundingClientRect();
                const r2 = targetEl.getBoundingClientRect();
                
                const startX = r1.right - wrap.left;
                const startY = r1.top + (r1.height / 2) - wrap.top;
                const endX = r2.left - wrap.left;
                const endY = r2.top + (r2.height / 2) - wrap.top;
                
                const curve = Math.max(30, Math.abs(endX - startX) * 0.4);
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${startX} ${startY} C ${startX + curve} ${startY}, ${endX - curve} ${endY}, ${endX} ${endY}`);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', sourceEl.style.borderLeftColor); // Color de la materia origen
                path.setAttribute('stroke-width', '2');
                path.setAttribute('opacity', '0.4');
                path.setAttribute('class', `arrow arrow-src-${pre} arrow-tgt-${sub.clave}`);
                
                // Flecha final
                const markerId = `head-${pre}-${sub.clave}`;
                if (!document.getElementById(markerId)) {
                    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                    marker.setAttribute('id', markerId);
                    marker.setAttribute('viewBox', '0 0 10 10');
                    marker.setAttribute('refX', '9');
                    marker.setAttribute('refY', '5');
                    marker.setAttribute('markerWidth', '5');
                    marker.setAttribute('markerHeight', '5');
                    marker.setAttribute('orient', 'auto-start-reverse');
                    marker.innerHTML = `<path d="M 0 0 L 10 5 L 0 10 z" fill="${sourceEl.style.borderLeftColor}" opacity="0.8"/>`;
                    svg.appendChild(marker);
                }
                path.setAttribute('marker-end', `url(#${markerId})`);
                svg.appendChild(path);
            });
        });
    }

    // INTERACTIVIDAD PANEL
    const ov = document.getElementById('ov');
    const pn = document.getElementById('pn');
    const xb = document.getElementById('xb');

    function openPanel(sub) {
        document.getElementById('pClave').innerText = sub.clave;
        document.getElementById('pClave').style.color = sub.color;
        document.getElementById('pNombre').innerText = sub.materia;
        
        const badge = document.getElementById('pLinea');
        badge.innerText = sub.linea;
        badge.style.backgroundColor = sub.color;

        document.getElementById('pCR').innerText = sub.cr;
        document.getElementById('pUC').innerText = sub.uc;
        document.getElementById('pHoras').innerText = sub.horas;

        document.getElementById('pPlan').innerText = sub.plan;
        document.getElementById('pTipo').innerText = sub.tipo;
        document.getElementById('pEq').innerText = sub.equiv;
        
        document.getElementById('pPrerreq').innerHTML = sub.prerreqs ? 
            sub.prerreqs.split(',').map(p => `<span style="display:inline-block; background:var(--bg); padding:3px 8px; border-radius:4px; margin:2px;">${p.trim()}</span>`).join(' ') 
            : 'Ninguno';

        const notasBox = document.getElementById('pNotasBox');
        if (sub.notas && sub.notas.trim() !== '') {
            document.getElementById('pNotas').innerText = sub.notas;
            notasBox.style.display = 'block';
        } else {
            notasBox.style.display = 'none';
        }

        ov.classList.add('open');
        pn.classList.add('open');
    }

    function closePanel() {
        ov.classList.remove('open');
        pn.classList.remove('open');
    }

    xb.onclick = closePanel;
    ov.onclick = closePanel;

    // Efectos visuales Flechas al hacer hover
    function highlightArrows(clave) {
        const arrows = document.querySelectorAll('.arrow');
        arrows.forEach(a => {
            if (a.classList.contains(`arrow-src-${clave}`) || a.classList.contains(`arrow-tgt-${clave}`)) {
                a.style.opacity = '1';
                a.style.strokeWidth = '3';
            } else {
                a.style.opacity = '0.05';
            }
        });
        
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            if (c.dataset.clave !== clave && 
                !c.dataset.prerreqs.includes(clave) && 
                !document.querySelector(`.card[data-clave="${clave}"]`).dataset.prerreqs.includes(c.dataset.clave)) {
                c.style.opacity = '0.3';
            }
        });
    }

    function resetArrows() {
        document.querySelectorAll('.arrow').forEach(a => {
            a.style.opacity = '0.4';
            a.style.strokeWidth = '2';
        });
        document.querySelectorAll('.card').forEach(c => c.style.opacity = '1');
    }

    // Repintar flechas al scrollear o redimensionar
    window.addEventListener('resize', drawArrows);
    document.getElementById('sc').addEventListener('scroll', drawArrows);

</script>
</body>
</html>
